<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La mejor juventud · Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --negro:#0f0f0f; --rojo:#c0392b; --rojo-claro:#e8e0dc;
  --papel:#f5f2ed; --blanco:#ffffff;
  --gris1:#2c2c2c; --gris2:#555; --gris3:#888; --gris4:#bbb; --gris5:#e8e5e0;
  --verde:#1a6b4a; --ambar:#b5620a; --azul:#1a4b7a;
  --radio:3px; --sombra:0 1px 4px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--papel);color:var(--negro);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── CABECERA ── */
.site-header{background:var(--negro);color:var(--blanco);padding:0 24px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--rojo)}
.header-inner{display:flex;align-items:center;gap:16px;height:52px;max-width:1600px;margin:0 auto}
.logo{font-family:'DM Serif Display';font-size:18px;letter-spacing:.3px;white-space:nowrap}
.logo em{color:var(--rojo);font-style:italic}
.header-meta{font-family:'DM Mono';font-size:10px;color:#999;letter-spacing:.5px;line-height:1.3}
.header-count{margin-left:auto;font-family:'DM Mono';font-size:11px;color:#bbb;white-space:nowrap}
.header-count b{color:var(--rojo);font-size:15px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#555;margin-right:5px;transition:background .3s}
.sync-dot.on{background:#2ecc71}

/* ── BARRA HERRAMIENTAS ── */
.toolbar{background:var(--blanco);border-bottom:1px solid var(--gris5);padding:10px 24px;position:sticky;top:52px;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.toolbar-inner{max-width:1600px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-wrap{flex:1 1 220px;position:relative;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
#q{width:100%;height:34px;border:1.5px solid var(--gris5);border-radius:var(--radio);padding:0 10px 0 32px;font:inherit;font-size:13px;background:var(--papel);transition:border-color .15s}
#q:focus{outline:none;border-color:var(--rojo)}
.sel{height:34px;border:1.5px solid var(--gris5);border-radius:var(--radio);padding:0 8px;font:inherit;font-size:12.5px;background:var(--papel);color:var(--gris1);cursor:pointer;transition:border-color .15s}
.sel:focus{outline:none;border-color:var(--rojo)}
.sel.active{border-color:var(--rojo);color:var(--rojo);font-weight:600;background:#fff8f7}
.btn{height:34px;padding:0 14px;border-radius:var(--radio);border:1.5px solid var(--gris5);background:var(--papel);font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--negro);color:var(--blanco);border-color:var(--negro)}
.btn.primary{background:var(--rojo);border-color:var(--rojo);color:#fff}
.btn.primary:hover{background:#9b2d20}
.view-toggle{display:flex;border:1.5px solid var(--gris5);border-radius:var(--radio);overflow:hidden}
.view-toggle button{height:32px;padding:0 11px;border:none;background:var(--papel);font:inherit;font-size:12px;cursor:pointer;color:var(--gris2)}
.view-toggle button.on{background:var(--negro);color:#fff}

/* ── CHIPS ACTIVOS ── */
.active-bar{max-width:1600px;margin:0 auto;padding:6px 24px;display:flex;flex-wrap:wrap;gap:6px;min-height:0}
.chip{display:inline-flex;align-items:center;gap:5px;background:#fff0ee;border:1px solid #f0c8c3;border-radius:20px;font-size:11.5px;font-family:'DM Mono';padding:3px 10px;color:var(--rojo)}
.chip button{border:none;background:none;cursor:pointer;color:var(--rojo);font-size:13px;line-height:1;padding:0 0 0 2px}

/* ── MAIN ── */
main{max-width:1600px;margin:0 auto;padding:16px 24px 80px}

/* ── ESTADÍSTICAS ── */
.stats-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.stat-card{flex:1 1 140px;background:var(--blanco);border:1px solid var(--gris5);border-top:3px solid var(--gris4);border-radius:var(--radio);padding:10px 14px}
.stat-card.red{border-top-color:var(--rojo)}
.stat-card.green{border-top-color:var(--verde)}
.stat-card.amber{border-top-color:var(--ambar)}
.stat-n{font-family:'DM Serif Display';font-size:26px;color:var(--negro)}
.stat-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--gris3);margin-top:2px}

/* ── VISTA GALERÍA (default) ── */
.galeria{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ficha{background:var(--blanco);border:1px solid var(--gris5);border-radius:var(--radio);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,transform .1s}
.ficha:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.ficha-img{height:160px;background:#ede9e3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-bottom:1px solid var(--gris5)}
.ficha-img img{width:100%;height:100%;object-fit:cover;display:block}
.ficha-img-placeholder{font-family:'DM Mono';font-size:10px;color:var(--gris4);text-align:center;padding:16px}
.ficha-img-placeholder svg{display:block;margin:0 auto 6px;opacity:.3}
.ficha-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:5px}
.ficha-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ficha-id{font-family:'DM Mono';font-size:11px;color:var(--rojo);font-weight:500}
.ficha-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:9.5px;font-family:'DM Mono';letter-spacing:.3px;padding:2px 6px;border-radius:2px;text-transform:uppercase;border:1px solid;white-space:nowrap}
.badge.orig{color:var(--azul);border-color:var(--azul);background:#f0f4fa}
.badge.repro{color:var(--gris2);border-color:var(--gris4)}
.badge.estado-ok{color:var(--verde);border-color:var(--verde);background:#f0faf5}
.badge.estado-pend{color:var(--ambar);border-color:var(--ambar);background:#fdf6ee}
.badge.estado-consul{color:var(--azul);border-color:var(--azul)}
.ficha-titulo{font-family:'DM Serif Display';font-size:14.5px;line-height:1.3;color:var(--negro)}
.ficha-meta{font-size:11.5px;color:var(--gris3);line-height:1.4}
.ficha-meta b{color:var(--gris1)}
.ficha-formato{font-size:11px;color:var(--gris2);background:var(--papel);border-radius:2px;padding:2px 6px;display:inline-block;margin-top:2px}
.ficha-obs{font-size:11px;color:var(--gris3);border-top:1px dashed var(--gris5);padding-top:6px;margin-top:4px;max-height:55px;overflow:hidden;-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical}
.ficha-footer{padding:8px 14px;border-top:1px solid var(--gris5);display:flex;align-items:center;justify-content:space-between;background:#fafaf8}
.ficha-inv{font-family:'DM Mono';font-size:10px;color:var(--gris3)}
.ficha-hoja{font-size:10px;color:var(--gris4)}

/* ── VISTA TABLA ── */
.tabla-wrap{overflow-x:auto;border-radius:var(--radio);border:1px solid var(--gris5)}
table{width:100%;border-collapse:collapse;background:var(--blanco)}
thead th{font-family:'DM Mono';text-transform:uppercase;font-size:10.5px;letter-spacing:.6px;text-align:left;padding:9px 10px;background:var(--negro);color:var(--blanco);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{background:#222}
thead th .arr{color:var(--rojo);margin-left:3px}
tbody td{padding:8px 10px;border-bottom:1px solid var(--gris5);vertical-align:top;font-size:12.5px}
tbody tr:hover{background:#fdf9f5}
tbody tr:last-child td{border-bottom:none}
td.td-img{width:64px;padding:4px 6px}
.thumb-mini{width:56px;height:44px;object-fit:cover;border-radius:2px;display:block;border:1px solid var(--gris5)}
.thumb-mini-ph{width:56px;height:44px;background:#ede9e3;border-radius:2px;display:flex;align-items:center;justify-content:center}
td.td-id{font-family:'DM Mono';font-size:11px;color:var(--rojo);white-space:nowrap}
td.td-id a{color:inherit;text-decoration:none;border-bottom:1px dotted}
td.td-tit{max-width:300px;font-size:12.5px}
td.td-tit .subtit{font-size:11px;color:var(--gris3)}

/* ── VISTA LISTADO (préstamo) ── */
.listado{display:flex;flex-direction:column;gap:0;border:1px solid var(--gris5);border-radius:var(--radio);overflow:hidden}
.listado-row{display:grid;grid-template-columns:56px 100px 1fr 120px 100px 90px;gap:12px;padding:10px 14px;border-bottom:1px solid var(--gris5);align-items:center;background:var(--blanco);font-size:12px}
.listado-row:last-child{border-bottom:none}
.listado-row:hover{background:#fdf9f5}
.listado-head{background:var(--negro)!important;color:var(--blanco);font-family:'DM Mono';font-size:10px;text-transform:uppercase;letter-spacing:.5px}

/* ── PRESTADORES LISTADO ── */
.prestador-group{margin-bottom:24px}
.prestador-name{font-family:'DM Serif Display';font-size:17px;padding:10px 14px;background:var(--negro);color:var(--blanco);border-radius:var(--radio) var(--radio) 0 0;display:flex;justify-content:space-between;align-items:center}
.prestador-name .cnt{font-family:'DM Mono';font-size:11px;color:#bbb}

/* ── EMPTY ── */
.empty{padding:60px 20px;text-align:center;color:var(--gris3);font-family:'DM Mono';font-size:13px}
.empty svg{display:block;margin:0 auto 12px;opacity:.25}

/* ── FOOTER ── */
footer{padding:12px 24px;border-top:1px solid var(--gris5);font-family:'DM Mono';font-size:10.5px;color:var(--gris3);max-width:1600px;margin:0 auto}

/* ── MODAL IMAGEN ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-img-wrap{max-width:90vw;max-height:90vh;position:relative}
.modal-img-wrap img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px}
.modal-close{position:absolute;top:-36px;right:0;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;font-family:'DM Mono'}
.modal-caption{color:#ccc;font-family:'DM Mono';font-size:11px;margin-top:8px;text-align:center}

@media print{
  .toolbar,.site-header,.active-bar,.stats-row,.modal-overlay{display:none!important}
  .ficha-img img{max-height:120px}
  body{font-size:11px}
}
@media(max-width:700px){
  .galeria{grid-template-columns:1fr 1fr}
  .listado-row{grid-template-columns:48px 1fr 80px}
  .listado-row > *:nth-child(n+4){display:none}
}
@media(max-width:480px){
  .galeria{grid-template-columns:1fr}
}
</style>
</head>

    <button class="btn" id="bLive" title="Sincronizar con Drive">↻ Drive</button>
    <button class="btn" id="bCSV">⬇ CSV</button>
    <button class="btn" onclick="window.print()">🖨 Imprimir</button>
  </div>
</div>

<div style="background:var(--blanco);border-bottom:1px solid var(--gris5)">
  <div class="active-bar" id="activeBar"></div>
</div>

<main>

  <div id="out"></div>
</main>

<footer id="footer"></footer>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

    <img id="modalImg" src="" alt="">
    <div class="modal-caption" id="modalCaption"></div>
  </div>
</div>

 estar en el Rollo; esa era la cuestión. Porque bajo la férula de una cultura oficial apergaminada y el ringorrango de otras costumbres apostólicas subyacía —en la España de 1975-– un flujo contestatario al margen del panfleto volandero y las directrices del partido. ¡Coño, el Rollo Macabeo!\nRock en vivo o enlatado en FM. Tebeos cachondos, Star Books y Ajoblanco. Un canuto, vino tinto y dos tripis. Vibraciones, Popular 1 y Disco Expres. El festival de Burgos y el de Canet. Zeleste y M&M. Clapton Is God y la Mahavishnu Orchestra… Ingredientes de un caldo gordo que se cocía a fuego lento en los fogones de aquel underground castizo y deficitario. Un guiso de pesada digestión para los guardianes del orden y de los principios fundamentales del Movimiento que nada entendían de flash o Mellotron. Y como remate un obituario sintético. Cuatro palabras cargadas de futuro: “Españoles, Franco ha muerto”… Para acto seguido salir la tropa por peteneras: ¡Viva el Rollo!","investigador":"Espejo","estado":"","etiquetas":"","img":"","prestadorCorto":"Comprar"},{"hoja":"9. FESTIVIDAD","bloque":"B2. DOCUMENTACIÓN BARES _DISCOTECAS","id":"1398","seccion":"PLANTA 1 - FESTIVIDAD","subseccion":"Espacio documental","titulo":"DISCO EXPRES N° 422 (ABRIL 1977).SYD BARRET (PINK FLOYD), GRUPOS MADRILEÑOS, FLAMIN GROOVIES","fecha":"1977","tecnica":"Documento","formato":"","medidas":"43 x 31 cm","orig":"ORIGINAL","ubicacion":"","enlaces":"https://www.todocoleccion.net/musica-revistas-antiguas/disco-expres-n-422-abril-1977-syd-barret-pink-floyd-grupos-madrilenos-flamin-groovies~x589179352","precio":"10.0","envio":"8.0","fee":"","prestador":"Comprar","digitalizacion":"","obs":"","investigador":"Espejo","estado":"","etiquetas":"","img":"","prestadorCorto":"Comprar"},{"hoja":"9. FESTIVIDAD","bloque":"B2. DOCUMENTACIÓN BARES _DISCOTECAS","id":"1399","seccion":"PLANTA 1 - FESTIVIDAD","subseccion":"Espacio documental","titulo":"COLEGIO MAYOR SAN JUAN EVANGELISTA CINE CLUB MADRID","fecha":"1979","tecnica // ── FILTRADO ──
function applyFilters(){
  const q=state.q.toLowerCase().trim();
  const pre=state.preset?PRESETS[state.preset].filter:null;
  return DATA.filter(r=>{
    if(pre&&!pre(r)) return false;
    if(state.hoja&&r.hoja!==state.hoja) return false;
    if(state.inv){
      const invs=(r.investigador||'').split(/[,;]\s*/);
      if(!invs.some(i=>i.trim()===state.inv)) return false;
    }
    if(state.orig&&r.orig!==state.orig) return false;
    if(state.estado&&r.estado!==state.estado) return false;
    if(q){
      const hay=[r.id,r.titulo,r.seccion,r.subseccion,r.bloque,r.tecnica,r.formato,r.prestador,r.prestadorCorto,r.obs,r.investigador,r.fecha,r.estado,r.etiquetas].join(' ').toLowerCase();
      if(!q.split(/\s+/).every(t=>hay.includes(t))) return false;
    }
    return true;
  });
}

function sortRows(rows){
  const k=state.sortKey,d=state.sortDir;
  return rows.slice().sort((a,b)=>String(a[k]||'').localeCompare(String(b[k]||''),'es',{numeric:true})*d);

// ── SINCRONIZACIÓN CON DRIVE ──
function parseCSV(text){
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=c;}
    else{if(c==='"')inQ=true;else if(c===','||c===';'){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);if(row.some(x=>x.trim()))rows.push(row);row=[];cur='';}else if(c!=='\r')cur+=c;}
  }
  if(cur||row.length){row.push(cur);if(row.some(x=>x.trim()))rows.push(row);}
  return rows;
}

function normKey(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z\/]/g,'');}

const EQUIPO=['Elia','Mónica','Monica','Alberto','Lidia','Inés','Ines','Kostis','Nanclares','Espejo','Rubén','Ruben','Oscar','Óscar','Carmina'];
function cleanInv(s){
  if(!s||s==='x'||s.length>60) return '';
  return s.split(/[,;\/]/).map(t=>{
    t=t.trim();
    if(!t||/^\d+$/.test(t)) return '';
    const match=EQUIPO.find(e=>e.toLowerCase()===t.toLowerCase());
    return match||(/^[A-ZÁÉÍÓÚÑ][a-záéíóúñ]{2,}/.test(t)?t:'');
  }).filter(Boolean).join(', ');
}

async function loadLive(url,showLabel){
  $('syncDot').className='sync-dot';
  $('syncLabel').textContent='Sincronizando…';
  try{
    let res;
    try{res=await fetch(url);if(!res.ok)throw new Error('direct');}
    catch(_){res=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));}
    const text=await res.text();
    const rows=parseCSV(text);
    if(rows.length<3)throw new Error('muy pocas filas');
    const hdr=rows[0];
    const colIdx={};
    hdr.forEach((h,i)=>{const k=normKey(h);colIdx[k]=i;});
    
    // Mapa flexible de columnas
    function gc(row,...names){
      for(const n of names){
        const idx=colIdx[normKey(n)];
        if(idx!==undefined&&idx<row.length&&row[idx]!=null)return String(row[idx]).trim();
      }
      return '';
    }
    
    const newData=rows.slice(1).map(row=>{
      const id=gc(row,'ID','id');
      const titulo=gc(row,'TÍTULO','TITULO','Título');
      if(!id&&!titulo) return null;
      const inv=cleanInv(gc(row,'INVESTIGADOR/A','INVESTIGADORA','investigador'));
      const prestador=gc(row,'PRESTADOR/A','PRESTADORA','prestador');
      const orig=gc(row,'ORIGINAL / REPRODUCCIÓN','ORIGINAL/REPRODUCCIÓN','orig').toUpperCase();
      return{
        id,titulo,
        hoja:gc(row,'hoja','HOJA'),
        bloque:gc(row,'bloque','BLOQUE'),
        seccion:gc(row,'SECCIÓN','SECCION','sección','seccion'),
        subseccion:gc(row,'SUBSECCIÓN','SUBSECCION'),
        fecha:gc(row,'FECHA'),
        tecnica:gc(row,'TÉCNICA','TECNICA'),
        formato:gc(row,'FORMATO EN SALA','formato'),
        medidas:gc(row,'MEDIDAS / DURACIÓN','MEDIDAS','medidas'),
        orig:orig.includes('ORIGINAL')&&!orig.includes('REPRO')?'ORIGINAL':orig.includes('REPRO')?'REPRODUCCIÓN':'',
        ubicacion:gc(row,'UBICACIÓN','UBICACION'),
        enlaces:gc(row,'ENLACES'),
        precio:gc(row,'PRECIO'),
        envio:gc(row,'ENVIO','ENVÍO'),
        fee:gc(row,'FEE'),
        prestador,
        prestadorCorto:prestador.split('\n')[0].slice(0,60).trim(),
        digitalizacion:gc(row,'DIGITALIZACIÓN','DIGITALIZACION'),
        obs:gc(row,'OBSERVACIONES ','OBSERVACIONES'),
        investigador:inv,
        estado:gc(row,'ESTADO'),
        etiquetas:gc(row,'ETIQUETA','ETIQUETAS'),
        img:''
      };
    }).filter(Boolean);
    
    if(newData.length<5)throw new Error('demasiado pocos registros');
    DATA.length=0;DATA.push(...newData);
    populateSelects();
    render();
    $('syncDot').className='sync-dot on';
    $('syncLabel').textContent=`${newData.length} registros · Drive`;
    $('footer').textContent='Datos sincronizados con Google Drive · '+new Date().toLocaleString('es-ES');
  }catch(e){
    $('syncDot').className='sync-dot';
    $('syncLabel').textContent='Datos locales ('+FALLBACK.length+' registros)';
    console.warn('Sync error:',e.message);
  }
}
